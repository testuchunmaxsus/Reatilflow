name: Web CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: ESLint + TypeScript check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  test:
    name: Vitest
    runs-on: ubuntu-22.04
    needs: lint-typecheck
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: vitest run
        run: npm test

  build:
    name: Production build
    runs-on: ubuntu-22.04
    needs: test
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build
        env:
          VITE_API_BASE_URL: "https://api.example.com"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  trivy-deps:
    name: Trivy (dependency scan)
    runs-on: ubuntu-22.04
    needs: lint-typecheck
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (fs — web)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "web/"
          format: "sarif"
          output: "trivy-web.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-web.sarif"
