name: Mobile CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Flutter analyze + test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: "stable"
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: dart run build_runner build
        # .g.dart fayllarini regeneratsiya qiladi (Drift, Riverpod, json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        run: flutter test --coverage

      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info
          retention-days: 7

  trivy-deps:
    name: Trivy (dependency scan — pubspec.lock)
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (fs — mobile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "mobile/"
          format: "sarif"
          output: "trivy-mobile.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-mobile.sarif"
