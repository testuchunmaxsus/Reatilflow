version: "3.9"

# ============================================================
# RETAIL — Lokal dev infra
# Servislar: postgres-primary, timescaledb, redis, minio
# Ishga tushirish: docker compose up -d
# ============================================================

x-postgres-common-env: &postgres-common-env
  POSTGRES_DB: ${POSTGRES_DB:-retail}
  POSTGRES_USER: ${POSTGRES_USER:-retail_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}

services:

  # ─── PostgreSQL 16 (Primary OLTP) ──────────────────────────
  postgres-primary:
    image: postgres:16-alpine
    container_name: retail-postgres-primary
    restart: unless-stopped
    environment:
      <<: *postgres-common-env
      # WAL yozish darajasi — kelajakda streaming replication uchun
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail_user} -d ${POSTGRES_DB:-retail}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retail-net

  # ─── TimescaleDB (GPS izlari) ──────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: retail-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-retail_gps}
      POSTGRES_USER: ${TIMESCALE_USER:-retail_gps_user}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-devpassword_ts}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "${TIMESCALE_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-retail_gps_user} -d ${TIMESCALE_DB:-retail_gps}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retail-net

  # ─── Redis 7 (kesh, sessiya, navbat) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: retail-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devpassword_redis}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - retail-net

  # ─── MinIO (S3-kompatibel object storage) ──────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-29T02-11-14Z
    container_name: retail-minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword_minio}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - retail-net

# ─── Volumes ───────────────────────────────────────────────
volumes:
  postgres_primary_data:
    driver: local
  timescale_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ─── Network ───────────────────────────────────────────────
networks:
  retail-net:
    driver: bridge
