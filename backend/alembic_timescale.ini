# TimescaleDB alohida Alembic konfiguratsiyasi
# Faqat GPS/time-series migratsiyalari uchun.
# OLTP (alembic.ini) dan mustaqil — TIMESCALE_URL ga ulanadi.
#
# Foydalanish:
#   cd backend
#   alembic -c alembic_timescale.ini upgrade head
#
# Yoki make target:
#   make migrate-timescale

[alembic]
# alembic_timescale/ katalogiga nisbatan yo'l
script_location = alembic_timescale

# Migratsiya fayl nomi formati
file_template = %%(rev)s_%%(slug)s

# True: har migratsiya alohida tranzaksiyada (tavsiya)
transaction_per_migration = true

# Timezone
timezone = UTC

# DB URL — env.py orqali settings.timescale_url dan olinadi.
# Bu yerga HECH QACHON real URL yozmang.
sqlalchemy.url =

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
