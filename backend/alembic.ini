# Alembic konfiguratsiyasi
# Batafsil: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# alembic/ katalogiga nisbatan yo'l
script_location = alembic

# Migratsiya fayl nomi formati
file_template = %%(rev)s_%%(slug)s

# True: har migratsiya alohida tranzaksiyada (tavsiya)
# False: barcha migratsiyalar bitta tranzaksiyada
transaction_per_migration = true

# Timezone
timezone = UTC

# DB URL — env.py orqali settings dan olinadi; bu yerda HECH QACHON real URL yozmang.
# env.py ichida: config.get_main_option("sqlalchemy.url") o'rniga settings.database_url ishlatiladi.
sqlalchemy.url =

[post_write_hooks]
# Migratsiya fayli yozilgandan keyin ruff bilan formatlash
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
