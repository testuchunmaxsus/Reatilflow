version: "3.9"

# ============================================================
# RETAIL — Production-yaqin compose
# Ishga tushirish:
#   cp .env.prod.example .env.prod
#   # .env.prod ni real qiymatlar bilan to'ldiring
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Masshtablash eslatmasi:
#   API ni 3 replika bilan ishga tushirish uchun:
#     docker compose -f docker-compose.prod.yml --env-file .env.prod \
#       up -d --scale api=3
#   Yoki Kubernetes HPA ga ko'chirish (infra/k8s/ ga qarang).
#
# Secrets: hech qachon haqiqiy qiymatlarni shu faylga yozmang.
#   Barcha maxfiy qiymatlar .env.prod faylida bo'lishi kerak.
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

x-api-env: &api-env
  APP_ENV: production
  APP_DEBUG: "false"
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL:-${DATABASE_URL}}
  TIMESCALE_URL: ${TIMESCALE_URL}
  REDIS_URL: ${REDIS_URL}
  MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET_PRODUCTS: ${MINIO_BUCKET_PRODUCTS:-retail-products}
  MINIO_BUCKET_CONTRACTS: ${MINIO_BUCKET_CONTRACTS:-retail-contracts}
  MINIO_BUCKET_PROOFS: ${MINIO_BUCKET_PROOFS:-retail-delivery-proofs}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
  PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
  BLIND_INDEX_KEY: ${BLIND_INDEX_KEY}
  FCM_SERVER_KEY: ${FCM_SERVER_KEY}
  APNS_KEY_ID: ${APNS_KEY_ID}
  APNS_TEAM_ID: ${APNS_TEAM_ID}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  CORS_ORIGINS: ${CORS_ORIGINS}

services:

  # ─── Reverse Proxy (Nginx) ──────────────────────────────────
  # Traefik ga o'tish uchun: infra/traefik/ papkasiga qarang (ixtiyoriy).
  # TLS sertifikatlar: ./infra/nginx/certs/ papkasiga joylashtiring.
  nginx:
    image: nginx:1.27-alpine
    container_name: retail-nginx
    <<: *default-restart
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - retail-net

  # ─── FastAPI API (× replika) ────────────────────────────────
  # Standart: 1 konteyner. Production'da --scale api=3 yoki K8s HPA.
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/retail}/retail-api:${IMAGE_TAG:-latest}
    <<: *default-restart
    logging: *default-logging
    environment:
      <<: *api-env
      APP_WORKERS: ${API_WORKERS:-2}
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── GPS Ingest servis (×2 replika tavsiya) ─────────────────
  gps-ingest:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/retail}/retail-api:${IMAGE_TAG:-latest}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 1
    <<: *default-restart
    logging: *default-logging
    environment:
      <<: *api-env
      APP_PORT: "8001"
      # GPS ingest uchun yuqori yozish yuki — alohida ulanish havzasi
      APP_GPS_INGEST_MODE: "true"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Arq Worker (×2 replika tavsiya) ────────────────────────
  # Push bildirishnomalar, hisobot, sync post-processing, shartnoma muddati
  worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/retail}/retail-api:${IMAGE_TAG:-latest}
    command: python -m app.worker.main
    <<: *default-restart
    logging: *default-logging
    environment:
      <<: *api-env
      APP_WORKER_MODE: "true"
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── PostgreSQL 16 Primary (OLTP) ──────────────────────────
  postgres-primary:
    image: postgres:16-alpine
    container_name: retail-postgres-primary
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail}
      POSTGRES_USER: ${POSTGRES_USER:-retail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Streaming replication uchun WAL
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=256MB
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=768MB
      -c log_min_duration_statement=500
      -c log_connections=on
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail_user} -d ${POSTGRES_DB:-retail}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── PostgreSQL Read Replica ─────────────────────────────────
  # Eslatma: to'liq streaming replication uchun infra/postgres/replica-setup.sh
  # ko'rsatmalarini bajaring (pg_basebackup + recovery.conf).
  # Statistika va katalog so'rovlari shu replikadan o'tadi.
  postgres-replica:
    image: postgres:16-alpine
    container_name: retail-postgres-replica
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail}
      POSTGRES_USER: ${POSTGRES_USER:-retail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    expose:
      - "5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail_user} -d ${POSTGRES_DB:-retail}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── TimescaleDB (GPS izlari) ──────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: retail-timescaledb
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-retail_gps}
      POSTGRES_USER: ${TIMESCALE_USER:-retail_gps_user}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=8MB
      -c timescaledb.telemetry_level=off
    volumes:
      - timescale_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-retail_gps_user} -d ${TIMESCALE_DB:-retail_gps}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Redis 7 (kesh / sessiya / navbat) ─────────────────────
  # Yuqori mavjudlik uchun: Redis Sentinel yoki Redis Cluster (infra/redis-sentinel/)
  redis:
    image: redis:7-alpine
    container_name: retail-redis
    <<: *default-restart
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy allkeys-lru
      --save 3600 1 300 100 60 10000
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 1200M

  # ─── MinIO (Object Storage) ─────────────────────────────────
  # CDN eslatmasi: production'da MinIO oldiga CDN (CloudFront, Cloudflare R2)
  # yoki nginx proxy_cache qo'yish tavsiya etiladi. Yoki to'g'ridan-to'g'ri
  # AWS S3 / Yandex Object Storage ishlatish mumkin (MINIO_ENDPOINT_URL o'zgartiring).
  minio:
    image: minio/minio:RELEASE.2024-06-29T02-11-14Z
    container_name: retail-minio
    <<: *default-restart
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SITE_NAME: "retail-storage"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - retail-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: retail-prometheus
    <<: *default-restart
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - retail-net

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: retail-grafana
    <<: *default-restart
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${DOMAIN:-localhost}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - retail-net

  # ─── Loki (log yig'ish) ─────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: retail-loki
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - retail-net

  # ─── Promtail (log yetkazish → Loki) ───────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: retail-promtail
    <<: *default-restart
    logging: *default-logging
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/prometheus/promtail.yml:/etc/promtail/config.yml:ro
    depends_on:
      - loki
    networks:
      - retail-net

# ─── Volumes ───────────────────────────────────────────────
volumes:
  postgres_primary_data:
    driver: local
  postgres_replica_data:
    driver: local
  timescale_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  nginx_logs:
    driver: local

# ─── Network ───────────────────────────────────────────────
networks:
  retail-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
