# ============================================================
# RETAIL — Nginx production konfiguratsiyasi
# TLS sertifikatlar: ./infra/nginx/certs/fullchain.pem
#                                          privkey.pem
# Let's Encrypt: certbot --nginx -d retail.example.com
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Log format (JSON — Loki bilan mos) ──────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"remote_addr":"$remote_addr",'
            '"correlation_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # ─── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ─── Rate limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:1m  rate=5r/s;
    limit_req_status 429;

    # ─── Upstream — API (3 replica uchun tayyor) ────────────
    upstream retail_api {
        least_conn;
        server api:8000;
        # --scale api=3 da Docker DNS round-robin ishlatadi.
        # Statik replika uchun:
        # server api_1:8000;
        # server api_2:8000;
        # server api_3:8000;
        keepalive 32;
    }

    upstream retail_grafana {
        server grafana:3000;
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name retail.example.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options          DENY        always;
        add_header X-Content-Type-Options   nosniff     always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 20M;

        # ─── API proxy ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://retail_api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_set_header   X-Request-ID      $request_id;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 5s;
        }

        # ─── Auth endpoint — qat'iy rate-limit ───────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass         http://retail_api/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
        }

        # ─── Health/readiness (kuzatuvchanlik uchun ochiq) ──
        location /health {
            proxy_pass http://retail_api/health;
            access_log off;
        }
        location /readiness {
            proxy_pass http://retail_api/readiness;
            access_log off;
        }

        # ─── Grafana (monitoring panel) ──────────────────────
        location /grafana/ {
            proxy_pass         http://retail_grafana/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── Veb SPA statik fayllar ──────────────────────────
        # Veb build chiqishi nginx'ga mount qilinishi kerak.
        # docker-compose.prod.yml da api servisiga
        #   volumes: - ./web/dist:/usr/share/nginx/html:ro
        # qo'shing yoki alohida nginx servis yarating.
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Statik assetlar — uzoq kesh
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
