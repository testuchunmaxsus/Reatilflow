global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    service: retail

# ─── Alert qoidalari ────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ─── Alertmanager (ixtiyoriy) ────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:

  # ─── FastAPI API (T27 metrikalar: /metrics endpoint) ────────
  - job_name: retail-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
    # Agar nginx ichida yashirilgan bo'lsa:
    # scrape_timeout: 10s

  # ─── GPS Ingest servis ───────────────────────────────────────
  - job_name: retail-gps-ingest
    static_configs:
      - targets: ["gps-ingest:8001"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── PostgreSQL Exporter (ixtiyoriy, kelajak) ────────────────
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # ─── Redis Exporter (ixtiyoriy, kelajak) ─────────────────────
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # ─── Nginx Exporter (ixtiyoriy, kelajak) ─────────────────────
  # - job_name: nginx
  #   static_configs:
  #     - targets: ["nginx-exporter:9113"]

  # ─── Prometheus o'zi ─────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
