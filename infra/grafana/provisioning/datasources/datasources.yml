apiVersion: 1

datasources:
  # ─── Prometheus ──────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # ─── Loki ────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    editable: false
    jsonData:
      derivedFields:
        # correlation_id → Prometheus exemplar (ixtiyoriy, kelajak OTel bilan)
        - name: TraceID
          matcherRegex: '"correlation_id":"([^"]+)"'
          url: ""
